<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مترجم بسيط</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #00e5ff;
    }
  </style>
</head>

<body>

  <h1>🌍 مترجم بسيط</h1>

  <input id="text" placeholder="اكتب النص هنا">

  <br>

  <select id="lang">
    <option value="en">إنجليزي</option>
    <option value="ar">عربي</option>
    <option value="fr">فرنسي</option>
    <option value="es">إسباني</option>
  </select>

  <br>

  <button onclick="translateText()">ترجم</button>

  <div id="result"></div>

  <script>
    async function translateText() {
      let text = document.getElementById("text").value;
      let lang = document.getElementById("lang").value;

      if (text === "") {
        document.getElementById("result").innerText = "اكتب نص الأول";
        return;
      }

      document.getElementById("result").innerText = "جاري الترجمة...";

      try {
        let response = await fetch("https://libretranslate.de/translate", {
          method: "POST",
          body: JSON.stringify({
            q: text,
            source: "auto",
            target: lang,
            format: "text"
          }),
          headers: { "Content-Type": "application/json" }
        });

        let data = await response.json();

        document.getElementById("result").innerText =
          "الترجمة: " + data.translatedText;

      } catch (error) {
        document.getElementById("result").innerText =
          "حصل خطأ في الترجمة";
      }
    }
  </script>

</body>
</html>
